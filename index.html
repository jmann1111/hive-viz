<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hive Viz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #09090b; color: #a0a0a0; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; }
    #layout { display: flex; width: 100%; height: 100%; }
    #sidebar {
      width: 300px; min-width: 0; height: 100%; background: #0c0c0e;
      border-right: 1px solid #1c1c1f; display: flex; flex-direction: column;
      transition: width 0.25s ease; overflow: hidden; position: relative; z-index: 10;
    }
    #sidebar.collapsed { width: 0; border-right: none; }
    .sb-shortcut-hint {
      padding: 5px 12px; font-size: 9px; color: #2a2a2f; letter-spacing: 0.3px;
      border-top: 1px solid #151517; text-align: center;
    }
    #reader-panel {
      width: 0; min-width: 0; height: 100%; background: #0c0c0e;
      border-right: 1px solid #1c1c1f; display: flex; flex-direction: column;
      overflow: hidden; position: relative;
    }
    #reader-panel.open { min-width: 400px; }
    #reader-resize {
      position: absolute; top: 0; right: -3px; width: 6px; height: 100%;
      cursor: col-resize; z-index: 11;
    }
    #reader-resize:hover { background: rgba(255,255,255,0.03); }
    #app { flex: 1; height: 100%; overflow: hidden; position: relative; min-width: 300px; }
    #orb-root {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 25;
    }
    ::selection { background: #2a2a30; color: #e0e0e0; }
  </style>
  <link rel="stylesheet" href="/src/styles/sidebar.css">
  <link rel="stylesheet" href="/src/styles/reader.css">
  <link rel="stylesheet" href="/src/styles/orb.css">
</head>
<body>
  <div id="gate" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;flex-direction:column;gap:12px;">
    <div style="font-size:11px;color:#333;letter-spacing:2px;text-transform:uppercase;">Hive Viz</div>
    <input id="gate-pw" type="password" placeholder="Password" autofocus
      style="padding:8px 14px;background:#111;border:1px solid #1c1c1f;border-radius:4px;color:#888;font-size:13px;font-family:inherit;outline:none;width:200px;text-align:center;">
    <div id="gate-err" style="font-size:10px;color:#553333;height:14px;"></div>
  </div>
  <div id="layout" style="display:none;">
    <aside id="sidebar"></aside>
    <div id="reader-panel">
      <div id="reader-resize"></div>
    </div>
    <div id="app">
      <div id="orb-root"></div>
    </div>
  </div>
  <script>
    const HASH = 'c228c20098d2ebb911206e5ce2806d3271c022cee9cd9c2393d9221a2ea7f817';
    const IS_LOCAL_DEV = ['localhost', '127.0.0.1'].includes(window.location.hostname);

    function unlockHive() {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('layout').style.display = 'flex';
      window.__hiveUnlocked = true;
      window.dispatchEvent(new Event('hive-unlock'));
    }

    async function check(pw) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('') === HASH;
    }

    if (IS_LOCAL_DEV) {
      unlockHive();
    }

    document.getElementById('gate-pw').addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter') return;
      if (await check(e.target.value)) {
        unlockHive();
      } else {
        document.getElementById('gate-err').textContent = 'Wrong password';
        e.target.value = '';
      }
    });
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
